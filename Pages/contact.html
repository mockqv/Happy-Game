<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="/Assets/Img/gamepad-solid-icon.svg" type="image/svg+xml" />
  <title>Contate-nos</title>
  <link rel="stylesheet" href="/Styles/contact.css">
</head>
<body>

  <header class="bg-info d-flex justify-content-between align-items-center px-4 py-2">
    <span class="span-title-header">
      <a href="../index.html" class="text-decoration-none">
        <span>H</span><span>a</span><span>p</span><span>p</span><span>y</span>
        <span>G</span><span>a</span><span>m</span><span>e</span>
      </a>
    </span>
    <div class="div-link d-flex gap-3">
      <a href="./championships.html">Campeonatos</a>
      <a href="./contact.html">Contato</a>
      <a href="./news.html">Novidades</a>
    </div>
  </header>
  <div class="header-space"></div>

  <main class="content">
    <div class="container">
      <div class="info-box">
        <h2>Contate-nos</h2>
        <p>Telefone: (11) 12345-6789</p>
        <p>Email: contato@exemplo.com</p>
        <p>Endereço: Rua Exemplo, 123 - São Paulo, SP</p>
      </div>

      <div class="form-box">
        <form id="contact-form">
            <input type="text" id="nome" placeholder="Seu nome" required />
            <input type="email" id="email" placeholder="Seu e-mail" required />
            <textarea id="mensagem" placeholder="Sua mensagem" required></textarea>
            <button type="submit">Enviar</button>
          </form>
          
          <p id="enviado">Mensagem enviada com sucesso!</p>
          
      </div>
    </div>
  </main>

  <footer class="bg-info text-white d-flex justify-content-between align-items-center px-4 py-3">
    <span class="copyright">&copy; 2025 Richard V. F. da Silva. Todos os direitos reservados</span>
    <div class="footer-links d-flex gap-3">
        <a href="/Pages/contact.html" id="contact" class="text-white text-decoration-none">Contate-nos</a>
        <a href="/Pages/feedback.html" id="feedback" class="text-white text-decoration-none">Feedback</a>
    </div>
  </footer>

  <script src="/Scripts/contact.js"></script>
</body>
</html>
